name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Python quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run linting
        run: uv run ruff check .

      - name: Run static type checking
        run: uv run mypy src tests

      - name: Run tests with coverage
        run: uv run pytest --cov=fleetmind_rag --cov-report=term-missing

      - name: Enforce routing feedback regression gate
        run: >-
          uv run fleetmind-rag feedback-gate
          --feedback-path evaluation/data/routing_feedback_ci.json
          --window-size 10
          --minimum-change 0.05
          --minimum-strategy-observations 2
          --format json
          --fail-on warn
